name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://mustacademy-backend.onrender.com/api

  backend:
    name: Backend — Syntax & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --input-type=module --eval "
          import('./src/app.js')
            .then(() => { console.log('✓ app.js OK'); process.exit(0); })
            .catch(e => { console.error('✗', e.message); process.exit(1); });
        "
        env:
          DATABASE_URL: postgresql://fake:fake@localhost/fake
          JWT_SECRET: ci-test-secret-not-real-32chars-long
          NODE_ENV: test
