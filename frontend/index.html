    <title>MustAcademy</title>
    <script>
      // --- NUCLEAR ANTI-ROBOT FIREWALL (v6_NUCLEAR) ---
      // This script runs before EVERYTHING to kill robotic fallbacks.
      (function() {
        console.log("%c[Firewall] Initializing Nuclear Audio Lock v6...", "color: #f59e0b; font-weight: bold;");
        
        // 1. Forcefully kill browser speech synthesis
        if (window.speechSynthesis) {
          window.speechSynthesis.speak = function() {
            console.warn("[Firewall] Robotic voice synthesis attempt BLOCKED.");
            return;
          };
          window.speechSynthesis.cancel();
        }

        // 2. Clear Cache if old version detected
        const CURRENT_VERSION = "v6_NUCLEAR";
        const savedVersion = localStorage.getItem("STUDIO_SYNC_ID");
        
        if (savedVersion !== CURRENT_VERSION) {
          console.warn("[Firewall] Version Mismatch! Clearing cache and force-reloading...");
          localStorage.setItem("STUDIO_SYNC_ID", CURRENT_VERSION);
          
          // Clear standard caches
          if ('caches' in window) {
            caches.keys().then(names => {
              for (let name of names) caches.delete(name);
            });
          }
          
          // Force nuclear reload
          setTimeout(() => {
            window.location.reload(true);
          }, 500);
        }
      })();
    </script>
